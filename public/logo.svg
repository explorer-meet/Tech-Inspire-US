<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-label="TEKinspire — Inspired by Technology">
  <defs>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded pill with three shapes -->
  <g>
    <rect x="6" y="22" width="170" height="64" rx="32" ry="32" fill="url(#pillGrad)"/>
    <!-- red square -->
    <rect x="30" y="40" width="26" height="26" rx="3" fill="#e11d2e"/>
    <!-- red right-pointing triangle -->
    <polygon points="74,40 100,54 74,68" fill="#e11d2e"/>
    <!-- white/cream circle -->
    <circle cx="140" cy="54" r="14" fill="#fff7ed"/>
  </g>

  <!-- Wordmark: TEK (dark) + inspire (orange) -->
  <g font-family="Poppins, 'Segoe UI', Inter, system-ui, sans-serif" font-weight="800" font-size="56">
    <text x="196" y="72" fill="#0f172a">TEK</text>
    <text x="304" y="72" fill="url(#textGrad)">inspire</text>
  </g>

  <!-- Tagline -->
  <g font-family="Poppins, 'Segoe UI', Inter, system-ui, sans-serif" font-weight="500" font-size="18" letter-spacing="0.5">
    <text x="198" y="108" fill="#ea580c">Inspired by Technology</text>
  </g>
</svg>
